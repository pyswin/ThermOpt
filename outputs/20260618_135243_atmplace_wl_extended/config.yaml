seed: 29
output_root: outputs
experiment_name: atmplace_wl_extended

case:
  source: atplace
  data_dir: external/ATPlace_pub/cases
  cases:
    - Case4
    - Case5
    - Case6
    - Case7
    - Case8
  unit_scale: 0.001
  initial_layout: random

thermal:
  grid_size: [100, 100]
  ambient: 25.0
  scale: 0.05
  sigma_factor: 1.0

objective:
  alpha: 1.0
  beta: 0.0
  gamma: 50.0
  delta: 80.0
  thermal_mode: topk
  topk_percent: 0.05
  temperature_limit: 85.0

atmplace:
  milp_chiplet_limit: 8
  cgd_steps: 400
  learning_rate: 0.015
  wl_weight: 1.0
  density_weight: 9000.0
  outline_weight: 30000.0
  legalize_candidates: 96
  legalize_iterations: 1500
  initial_anneal_temp: 0.25
  final_anneal_temp: 0.001
  report_every: 100
