seed: 17
output_root: outputs
experiment_name: atplace_wl_compare

case:
  source: atplace
  data_dir: external/ATPlace_pub/cases
  cases:
    - Case1
    - Case2
    - Case3
  unit_scale: 0.001
  initial_layout: random

thermal:
  grid_size: [100, 100]
  ambient: 25.0
  scale: 0.05
  sigma_factor: 1.0

objective:
  alpha: 1.0
  beta: 0.0
  gamma: 50.0
  delta: 80.0
  thermal_mode: topk
  topk_percent: 0.05
  temperature_limit: 85.0

simulated_annealing:
  iterations: 700
  initial_anneal_temp: 1.0
  final_anneal_temp: 0.01
  move_scale: 5.0
  report_every: 50

genetic_algorithm:
  population_size: 24
  generations: 35
  elite_count: 3
  mutation_rate: 0.45
  tournament_size: 3
  move_scale: 5.0

reinforcement_learning:
  episodes: 70
  max_steps: 60
  rollout_steps: 120
  learning_rate: 0.03
  gamma: 0.97
  entropy_coef: 0.005
  epsilon: 0.08
  move_scale: 5.0
  accept_worse_probability: 0.02
  log_every: 10
  verbose: true

sequence_pair:
  iterations: 2500
  initial_anneal_temp: 1.0
  final_anneal_temp: 0.01
  report_every: 50

continuous_wl:
  steps: 1500
  restarts: 3
  learning_rate: 0.04
  overlap_weight: 20000.0
  outline_weight: 100000.0
  report_every: 300
