seed: 17
output_root: outputs
experiment_name: rl_from_milp_5_7

case:
  source: atplace
  data_dir: external/ATPlace_pub/cases
  cases:
    - Case5
    - Case6
    - Case7
  unit_scale: 0.001
  initial_layout: random

thermal:
  backend: heuristic
  grid_size: [64, 64]
  ambient: 25.0
  scale: 0.05
  sigma_factor: 1.0

objective:
  alpha: 1.0
  beta: 0.0
  gamma: 50.0
  delta: 80.0
  thermal_mode: topk
  topk_percent: 0.05
  temperature_limit: 85.0

baseline_optimizer: milp_only

milp_only:
  milp_time_limit: 300
  mip_rel_gap: 0.01
  verbose: false

rl_local_search:
  num_candidates: 20
  total_steps: 800
  epsilon_start: 0.1
  epsilon_end: 0.02
  hidden_dim: 64
  learning_rate: 0.001
  gamma: 0.99
  buffer_capacity: 8000
  batch_size: 32
  train_after: 40
  target_update_freq: 10
  tau: 0.01
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_end: 1.0
  reject_penalty: -0.01
  suboptimal_accept_penalty: -0.01
  move_scale: 0.5
  restart_interval: 100
  report_every: 100
