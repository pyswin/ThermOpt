seed: 17
output_root: outputs
experiment_name: benchmark_wl_only_at_atm_flexplanner_case7

case:
  source: atplace
  data_dir: external/ATPlace_pub/cases
  cases:
    - Case7
  unit_scale: 0.001
  initial_layout: random

thermal:
  backend: heuristic
  grid_size: [100, 100]
  ambient: 25.0
  scale: 0.05
  sigma_factor: 1.0

objective:
  alpha: 1.0
  beta: 0.0
  gamma: 50.0
  delta: 80.0
  thermal_mode: topk
  topk_percent: 0.05
  temperature_limit: 85.0

atplace:
  milp_time_limit: 60
  mip_rel_gap: 0.001
  refine_steps: 300
  learning_rate: 0.015
  wl_weight: 1.0
  density_weight: 8000.0
  outline_weight: 30000.0
  legal_perturb_iterations: 1000
  initial_anneal_temp: 0.4
  final_anneal_temp: 0.002
  report_every: 100
  verbose: false

atmplace:
  milp_chiplet_limit: 8
  milp_time_limit: 60
  mip_rel_gap: 0.001
  cgd_steps: 300
  learning_rate: 0.015
  wl_weight: 1.0
  density_weight: 9000.0
  outline_weight: 30000.0
  legalize_candidates: 64
  legalize_iterations: 1000
  initial_anneal_temp: 0.25
  final_anneal_temp: 0.001
  report_every: 100
  verbose: false


reinforcement_learning:
  variant: flexplanner
  placement_order: degree_area
  grid: 64
  episodes: 1000
  hidden_dim: 64
  learning_rate: 0.0001
  gamma: 0.99
  gae_lambda: 0.95
  ppo_epochs: 10
  batch_size: 128
  clip_epsilon: 0.20
  entropy_coef: 0.02
  critic_coef: 0.5
  max_grad_norm: 5.0
  wire_mask_scale: 1.0
  reward_scale: 512.0
  invalid_placement_penalty: 1.0
  reward_weight_overlap: 0.5
  wire_mask_bias: 0.5
  greedy_wire_mask: false
  along_boundary: true
  overlap_ratio: 0.05
  shuffle_placement_order: false
  fixed_first_macros: 0
  verbose: true

  terminal_reward_coef: 50.0
  terminal_overlap_penalty_coef: 40.0
  terminal_outline_penalty_coef: 80.0
  selection_overlap_penalty_coef: 40.0
  selection_outline_penalty_coef: 80.0
  max_selection_overlap_penalty: 0.01
  max_selection_outline_penalty: 0.0
  elite_replay_coef: 0.2
  elite_replay_epochs: 1
  elite_replay_final_epochs: 20
  elite_replay_match_epochs: 100
  elite_replay_match_coef: 2.0
  elite_replay_margin: 1.0
