seed: 17
output_root: outputs
experiment_name: optimizer_comparison_rl_0623_case7

case:
  source: atplace
  data_dir: external/ATPlace_pub/cases
  cases:
    - Case7
  unit_scale: 0.001
  initial_layout: random

thermal:
  backend: heuristic
  grid_size: [64, 64]
  ambient: 25.0
  scale: 1.8
  sigma_factor: 1.0

objective:
  alpha: 1.0
  beta: 0.0
  gamma: 50.0
  delta: 80.0
  thermal_mode: topk
  topk_percent: 0.05
  temperature_limit: 85.0

simulated_annealing:
  iterations: 900
  initial_anneal_temp: 1.0
  final_anneal_temp: 0.01
  move_scale: 10.0
  report_every: 10

genetic_algorithm:
  population_size: 24
  generations: 40
  elite_count: 3
  mutation_rate: 0.45
  tournament_size: 3
  move_scale: 10.0

reinforcement_learning:
  placement_order: degree_area
  grid: 64
  episodes: 500
  num_chiplets_to_place: 64
  rollout_steps: 64
  hidden_dim: 64
  learning_rate: 0.0002
  gamma: 0.97
  gae_lambda: 0.95
  ppo_epochs: 6
  batch_size: 32
  clip_epsilon: 0.15
  entropy_coef: 0.001
  critic_coef: 0.5
  max_grad_norm: 0.5
  reward_scale: 80.0
  invalid_placement_penalty: 1.0
  wire_mask_bias: 1.0
  greedy_wire_mask: true
  shuffle_placement_order: true
  verbose: true
  tree_search_enabled: true
  frontier_capacity: 8
  frontier_update_every: 1
  tree_exploration_weight: 100.0
  terminal_reward_coef: 0.0
