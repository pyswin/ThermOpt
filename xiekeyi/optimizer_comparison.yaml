seed: 17
output_root: outputs
experiment_name: optimizer_comparison_rl_0620

case:
  source: atplace
  data_dir: external/ATPlace_pub/cases
  cases:
    - Case1
    - Case2
    - Case3
  unit_scale: 0.001
  initial_layout: random

thermal:
  backend: heuristic
  grid_size: [64, 64]
  ambient: 25.0
  scale: 1.8
  sigma_factor: 1.0

objective:
  alpha: 1.0
  beta: 1.0
  gamma: 50.0
  delta: 80.0
  thermal_mode: topk
  topk_percent: 0.05
  temperature_limit: 85.0

simulated_annealing:
  iterations: 900
  initial_anneal_temp: 1.0
  final_anneal_temp: 0.01
  move_scale: 10.0
  report_every: 10

genetic_algorithm:
  population_size: 24
  generations: 40
  elite_count: 3
  mutation_rate: 0.45
  tournament_size: 3
  move_scale: 10.0

reinforcement_learning:
  episodes: 1000
  max_steps: 70
  rollout_steps: 70
  move_scale: 1.0
  hidden_dim: 128
  learning_rate: 0.0004
  gamma: 0.97
  gae_lambda: 0.98
  ppo_epochs: 10
  batch_size: 128
  clip_epsilon: 0.2
  entropy_coef: 0.001
  critic_coef: 0.5
  reward_scale: 10.0
  invalid_placement_penalty: 1.0
  max_grad_norm: 0.5
  wirelength_weight: 1.0
  thermal_weight: 1.0
  outline_penalty_weight: 10.0
  overlap_penalty_weight: 10.0
